name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ---- Setup ----
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # npm's CLI hits a reproducible "Exit handler never called!" bug on this
      # runner image partway through installing this dependency tree (npm ci,
      # npm install, cache-clean, and retries all reproduce it identically).
      # Yarn does not share this bug, so it's used here for a reliable install.
      - name: Install dependencies
        run: |
          set -e
          yarn install --frozen-lockfile --non-interactive
          test -f "node_modules/expo/package.json"
          test -f "node_modules/.bin/expo"
          test -f "node_modules/react-native/package.json"

      # ---- Build ----
      - name: Expo Prebuild (generate Android native project)
        run: npx expo prebuild --platform android --non-interactive --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ---- Upload ----
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waffle-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
