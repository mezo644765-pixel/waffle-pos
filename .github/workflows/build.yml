name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ---- Setup ----
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          set -e
          install_and_verify() {
            rm -rf node_modules
            npm ci --no-audit --no-fund --loglevel=error || true
            [ -d "node_modules/expo" ] && [ -d "node_modules/react-native" ]
          }
          if install_and_verify; then
            echo "Dependencies installed and verified on first attempt."
          else
            echo "Install incomplete (this runner occasionally leaves node_modules partially populated after npm reports success) - retrying..."
            for i in 1 2; do
              if install_and_verify; then
                echo "Dependencies installed and verified on retry $i."
                exit 0
              fi
              echo "Retry $i failed, waiting before next attempt..."
              sleep 10
            done
            echo "::error::node_modules/expo or node_modules/react-native still missing after retries."
            exit 1
          fi

      # ---- Build ----
      - name: Expo Prebuild (generate Android native project)
        run: npx expo prebuild --platform android --non-interactive --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ---- Upload ----
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waffle-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
